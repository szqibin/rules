name: Mihomo Rules Auto-Build
on:
  # push:  # 已注释自动触发
  #   branches:
  #     - program
  #   paths:
  #     - 'config.json'
  #     - 'custom/**'
  
  schedule:
    - cron: '0 2 * * *' # 每天凌晨2点定时运行
  workflow_dispatch:    # 支持手动点击运行

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          ref: program # 从 program 分支拉取

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run Merge Script
        run: python scripts/merge.py

      - name: Setup Mihomo
        run: |
          URL=$(curl -s https://api.github.com/repos/MetaCubeX/mihomo/releases/latest | grep "browser_download_url.*linux-amd64-v" | cut -d '"' -f 4 | head -n 1)
          curl -L -o mihomo.gz "$URL"
          gunzip mihomo.gz && chmod +x mihomo

      - name: Prepare Deployment Directory
        run: |
          mkdir -p deploy/mrs   # 改为 mrs 目录
          mkdir -p deploy/raw   # 存放原始文本

      - name: Compile and Copy
        run: |
          for file in source/*.list; do
            filename=$(basename "$file" .list)
            if [ -f "source/${filename}.type" ]; then
              ptype=$(cat "source/${filename}.type")
            else
              ptype="domain"
            fi
            # 编译到 mrs 目录
            ./mihomo convert-ruleset "$ptype" text "$file" "deploy/mrs/${filename}.mrs"
            # 复制原始文本到 raw 目录
            cp "$file" "deploy/raw/${filename}.txt"
          done

      - name: Deploy to Release Branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          # 同一仓库操作，直接使用 GITHUB_TOKEN，无需 Secret
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: release
          publish_dir: ./deploy
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: "Auto-build rules at $(date +'%Y-%m-%d %H:%M')"
          keep_files: false # 每次部署清空旧文件，确保分支干净
