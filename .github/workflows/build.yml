name: Rules Auto-Build
on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          ref: program

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run Merge Script
        run: python scripts/merge.py

      - name: Setup Core Binaries
        run: |
          # 1. 下载并配置 Mihomo
          M_URL=$(curl -s https://api.github.com/repos/MetaCubeX/mihomo/releases/latest | grep "browser_download_url.*linux-amd64-v" | cut -d '"' -f 4 | head -n 1)
          curl -L -o mihomo.gz "$M_URL"
          gunzip mihomo.gz && chmod +x mihomo
          
          # 2. 下载并配置 Sing-box
          S_URL=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | grep "browser_download_url.*linux-amd64.tar.gz" | cut -d '"' -f 4 | head -n 1)
          curl -L -o sing-box.tar.gz "$S_URL"
          tar -xzf sing-box.tar.gz
          mv sing-box-*/sing-box ./
          chmod +x sing-box

      - name: Prepare Deployment Directory
        run: |
          # 按照要求建立隔离目录
          mkdir -p deploy/mihomo/raw
          mkdir -p deploy/mihomo/rule-set
          mkdir -p deploy/sing-box/raw
          mkdir -p deploy/sing-box/rule-set

      - name: Compile and Copy
        run: |
          # 1. 编译并复制 Mihomo 规则
          if [ -d "source/mihomo" ]; then
            for file in source/mihomo/*.list; do
              [ -e "$file" ] || continue
              filename=$(basename "$file" .list)
              [ -f "source/mihomo/${filename}.type" ] && ptype=$(cat "source/mihomo/${filename}.type") || ptype="domain"
              ./mihomo convert-ruleset "$ptype" text "$file" "deploy/mihomo/rule-set/${filename}.mrs"
              cp "$file" "deploy/mihomo/raw/${filename}.txt"
            done
          fi

          # 2. 编译并复制 Sing-box 规则
          if [ -d "source/sing-box" ]; then
            for file in source/sing-box/*.json; do
              [ -e "$file" ] || continue
              filename=$(basename "$file" .json)
              ./sing-box rule-set compile "$file" -o "deploy/sing-box/rule-set/${filename}.srs"
              cp "$file" "deploy/sing-box/raw/${filename}"
            done
          fi

      - name: Get current date
        id: get_date
        run: echo "today=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M')" >> $GITHUB_OUTPUT

      - name: Deploy to Release Branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: release
          publish_dir: ./deploy
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: "Auto-build dual-core rules at ${{ steps.get_date.outputs.today }}"
          keep_files: false
