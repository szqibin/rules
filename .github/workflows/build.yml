name: Mihomo Rules Auto-Build
on:
  push:
    paths:
      - 'config.json'
      - 'custom/**'
      - 'scripts/**'
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

# 设置环境变量以提前适配 Node.js 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        # 建议检查是否有 @v5 或更高版本，目前先沿用 v4 并配合环境变量
        uses: actions/checkout@v4

      - name: Set up Python
        # 建议检查是否有 @v6 或更高版本，目前先沿用 v5 并配合环境变量
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run Merge Script
        run: python scripts/merge.py

      - name: Setup Mihomo
        run: |
          URL=$(curl -s https://api.github.com/repos/MetaCubeX/mihomo/releases/latest | grep "browser_download_url.*linux-amd64-v" | cut -d '"' -f 4 | head -n 1)
          curl -L -o mihomo.gz "$URL"
          gunzip mihomo.gz && chmod +x mihomo

      - name: Compile to MRS
        run: |
          mkdir -p build
          for file in source/*.list; do
            filename=$(basename "$file" .list)
            if [ -f "source/${filename}.type" ]; then
              ptype=$(cat "source/${filename}.type")
            else
              ptype="domain"
            fi
            echo "Compiling $filename as $ptype..."
            ./mihomo convert-ruleset "$ptype" text "$file" "build/${filename}.mrs"
          done
     
      - name: Get current date
        id: get_date
        run: echo "today=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M')" >> $GITHUB_OUTPUT

      - name: Deploy to Release Repo
        # 注意：此 Action 内部可能也使用了 Node 20，若报错请检查作者更新
        uses: cpina/github-action-push-to-another-repository@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.MY_DEPLOY_TOKEN }}
        with:
          source-directory: 'build'
          destination-github-username: 'szqibin'
          destination-repository-name: 'mihomo-rules-release'
          user-email: 'panda0206@gmail.com'
          target-branch: 'main'
          target-directory: 'release' # MRS文件将存放在公有仓库的 release/ 目录下
          commit-message: "Build Rules: ${{ steps.get_date.outputs.today }}"
